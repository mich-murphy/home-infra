name: Actions

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actions:
    uses: ./.github/workflows/_quality-gate.yaml
    with:
      check: actions
