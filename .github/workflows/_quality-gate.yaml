name: Quality Gate Template

on:
  workflow_call:
    inputs:
      check:
        required: true
        type: string

permissions:
  contents: read

jobs:
  static:
    name: ${{ inputs.check }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          # Per-check keys: the gate jobs run in parallel and build different tools,
          # so a single shared key would only ever persist the first job's store.
          primary-key: nix-${{ runner.os }}-${{ inputs.check }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ inputs.check }}-
          # Trim oversized stores before saving; GitHub evicts least-recently-used
          # caches once the repo exceeds its 10GB total.
          gc-max-store-size-linux: 5G
      - name: Check flake
        if: inputs.check == 'nix'
        run: nix flake check
      - name: Lint workflows
        if: inputs.check == 'actions'
        run: nix shell .#actionlint --command actionlint
      - name: Check Terraform formatting
        if: inputs.check == 'terraform'
        run: nix shell .#terraform-ci --command terraform-ci -chdir=terraform fmt -check -recursive
      - name: Validate Terraform roots
        if: inputs.check == 'terraform'
        env:
          TF_IN_AUTOMATION: "true"
        run: |
          nix shell .#terraform-ci --command bash -euo pipefail <<'SCRIPT'
          for dir in terraform terraform/network; do
            echo "Validating ${dir}"
            terraform-ci -chdir="${dir}" init -backend=false -input=false -lockfile=readonly
            terraform-ci -chdir="${dir}" validate
          done
          SCRIPT
      - name: Render Compose files
        if: inputs.check == 'docker'
        env:
          ADMIN_PASSWORD: ci-placeholder
          ADMIN_USERNAME: ci-placeholder
          CF_API_EMAIL: ci@example.invalid
          CF_DNS_API_TOKEN: ci-placeholder
          COUCHDB_PASSWORD: ci-placeholder
          DATABASE_PASSWORD: ci-placeholder
          DB_DATABASE_NAME: immich
          DB_DATA_LOCATION: /tmp/immich-db
          DB_PASSWORD: ci-placeholder
          DB_USERNAME: immich
          ENCRYPTION_KEY: ci-placeholder
          MAXMIND_LICENSE_KEY: ci-placeholder
          OWNCLOUD_DB_PASSWORD: ci-placeholder
          PLEX_CLAIM: ci-placeholder
          TZ: Australia/Melbourne
          UPLOAD_LOCATION: /tmp/immich-upload
        run: |
          nix shell .#docker-compose --command bash -euo pipefail <<'SCRIPT'
          while IFS= read -r compose_file; do
            echo "Checking ${compose_file}"
            docker-compose -f "${compose_file}" config --quiet
          done < <(find docker -name compose.yml -print | sort)
          SCRIPT
      - name: Build and validate active kustomizations
        if: inputs.check == 'kubernetes'
        run: |
          nix shell .#kubectl .#kubeconform --command bash -euo pipefail <<'SCRIPT'
          # Vendored schemas (.github/schemas) take precedence over the
          # CRDs-catalog — used where the catalog copy is stale (volsync).
          # The catalog covers Flux, Gateway API, cert-manager, cilium.io and
          # external-secrets kinds; -ignore-missing-schemas stays as the
          # fallback for anything neither location has.
          schema_args=(
            -schema-location default
            -schema-location '.github/schemas/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          )
          while IFS= read -r kustomization; do
            dir="${kustomization%/*}"
            echo "Checking ${dir}"
            kubectl kustomize "${dir}" | kubeconform -summary -strict -ignore-missing-schemas "${schema_args[@]}"
          done < <(find kubernetes -path kubernetes/archive -prune -o -name kustomization.yaml -print | sort)
          SCRIPT
      - name: Render and validate Talos config
        if: inputs.check == 'talos'
        run: |
          nix shell .#talosctl .#yq-go --command bash -euo pipefail <<'SCRIPT'
          yq eval 'true' talos/schematic.yaml > /dev/null
          # Throwaway secrets; renders the real machine config so schema errors
          # in the patch fail the gate instead of surfacing at apply time.
          talosctl gen config ci https://10.77.20.20:6443 \
            --config-patch @talos/controlplane-patch.yaml \
            --config-patch @talos/firewall-patch.yaml \
            --output-types controlplane --output - | talosctl validate --mode metal --config /dev/stdin
          SCRIPT
      - name: Lint Ansible
        if: inputs.check == 'ansible'
        # galaxy install: kewlfft.aur is not bundled with nixpkgs ansible
        run: nix shell .#ansible-lint --command bash -euo pipefail -c 'cd ansible && ansible-galaxy collection install -r requirements.yaml && ansible-lint'
