name: Renovate
on:
  workflow_dispatch:
    inputs:
      overrideSchedule:
        description: "Override all schedules"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "30 4,6 * * *"
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        env:
          RENOVATE_FORCE: ${{ inputs.overrideSchedule == true && '{''schedule'':null}' || '' }}
          RENOVATE_HOST_RULES: >-
            [{"hostType":"docker","matchHost":"ghcr.io","username":"mich-murphy","password":"${{ secrets.RENOVATE_TOKEN }}"}]
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.RENOVATE_TOKEN }}
