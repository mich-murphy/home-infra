---
- hosts: docker
  become: true
  vars_files:
    - "group_vars/secrets.yaml"
  roles:
    - common
    - firewall
    - media
    - docker

- hosts: ai-dev
  become: true
  remote_user: michael
  roles:
    - common
    - ai-dev

- hosts: unifi
  become: true
  vars_files:
    - "group_vars/secrets.yaml"
  roles:
    - common
    - firewall
    - unifi

# RB5009 config is pushed over the RouterOS API from localhost (no SSH/become);
# connection params injected here via module_defaults, credentials from the vault.
- hosts: routeros
  gather_facts: false
  vars_files:
    - "group_vars/secrets.yaml"
  module_defaults:
    group/community.routeros.api:
      hostname: "{{ routeros_api_host }}"
      username: "{{ routeros_api_user }}"
      password: "{{ routeros_api_password }}"
      tls: true
      validate_certs: false
  roles:
    - routeros
