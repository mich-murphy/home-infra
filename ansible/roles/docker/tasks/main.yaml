---
# this role manages compose stacks but deliberately does not install docker
# (host runs docker-ce; an apt docker.io install would conflict)
- name: check docker compose availability
  ansible.builtin.command:
    cmd: docker compose version
  register: docker_compose_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: assert docker and the compose plugin are installed
  ansible.builtin.assert:
    that: docker_compose_check.rc == 0
    fail_msg: >-
      docker with the compose plugin is required on {{ inventory_hostname }}
      but `docker compose version` failed; install docker-ce and the
      docker-compose-plugin before running this role

- name: ensure Docker daemon config directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: configure Docker daemon log rotation
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "log-driver": "{{ docker_log_driver }}",
        "log-opts": {
          "max-size": "{{ docker_log_max_size }}",
          "max-file": "{{ docker_log_max_file | string }}"
        }
      }
  register: docker_daemon_config

- name: apply Docker daemon config before compose changes
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: docker_daemon_config.changed

- name: install Docker image prune service
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker-image-prune.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Prune unused Docker images
      Wants=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/docker image prune -f --filter until={{ docker_image_prune_until }}
  register: docker_image_prune_service

- name: install Docker image prune timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker-image-prune.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run Docker image prune weekly

      [Timer]
      OnCalendar={{ docker_image_prune_calendar }}
      Persistent=true
      RandomizedDelaySec={{ docker_image_prune_randomized_delay }}

      [Install]
      WantedBy=timers.target
  register: docker_image_prune_timer

- name: reload systemd after Docker prune unit changes
  ansible.builtin.systemd:
    daemon_reload: true
  when: docker_image_prune_service.changed or docker_image_prune_timer.changed

- name: configure Docker image prune timer state
  ansible.builtin.systemd:
    name: docker-image-prune.timer
    enabled: "{{ docker_image_prune_enabled }}"
    state: "{{ 'started' if docker_image_prune_enabled else 'stopped' }}"

- name: sync init compose files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker/init/"
    dest: "{{ srv_dir }}/"
    owner: "{{ username }}"
    mode: "0775"

- name: ensure Pocket ID secret directory exists
  ansible.builtin.file:
    path: "{{ pocket_id_encryption_key_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: check for Pocket ID encryption key
  ansible.builtin.stat:
    path: "{{ pocket_id_encryption_key_path }}"
  register: pocket_id_key_file

# side-effect free; runs in --check so the key fact below resolves
- name: generate Pocket ID encryption key
  ansible.builtin.command:
    cmd: openssl rand -hex 32
  register: generated_pocket_id_key
  changed_when: false
  check_mode: false
  when: not pocket_id_key_file.stat.exists
  no_log: true

- name: persist Pocket ID encryption key
  ansible.builtin.copy:
    content: "{{ generated_pocket_id_key.stdout }}\n"
    dest: "{{ pocket_id_encryption_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: not pocket_id_key_file.stat.exists
  no_log: true

- name: read Pocket ID encryption key
  ansible.builtin.slurp:
    src: "{{ pocket_id_encryption_key_path }}"
  register: pocket_id_key
  check_mode: false
  when: pocket_id_key_file.stat.exists
  no_log: true

# freshly generated key is used directly; in --check the file is never written
- name: set Pocket ID encryption key fact
  ansible.builtin.set_fact:
    pocket_id_encryption_key: >-
      {{ (pocket_id_key.content | b64decode | trim)
         if pocket_id_key_file.stat.exists
         else generated_pocket_id_key.stdout }}
  no_log: true

- name: setup .env file
  ansible.builtin.copy:
    content: |
      CF_DNS_API_TOKEN={{ CF_DNS_API_TOKEN }}
      CF_API_EMAIL={{ CF_API_EMAIL }}
      ENCRYPTION_KEY={{ pocket_id_encryption_key }}
      MAXMIND_LICENSE_KEY={{ MAXMIND_LICENSE_KEY }}
    dest: "{{ srv_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

# no --force-recreate: compose only recreates services whose config/image changed
- name: start init compose file
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ srv_dir }}"
  changed_when: true  # compose reconciles state itself; reporting changed is the safe default
