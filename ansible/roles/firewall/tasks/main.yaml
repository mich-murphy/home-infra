---
- name: install firewall
  ansible.builtin.apt:
    name: ufw
    state: present

- name: enable ufw
  community.general.ufw:
    state: enabled

- name: deny incoming traffic
  community.general.ufw:
    default: deny
    direction: incoming

- name: allow outgoing traffic
  community.general.ufw:
    default: allow
    direction: outgoing

- name: allow traffic over tailscale
  community.general.ufw:
    rule: allow
    interface_in: tailscale0
  notify: reload ufw

- name: allow configured inbound ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from | default('any') }}"
  loop: "{{ firewall_allow_ports | default([]) }}"
  notify: reload ufw

# docker-host only: lets the compose bridge reach the Tailscale CGNAT range.
# Enabled by setting firewall_docker_bridge_subnet in group vars.
- name: allow internal docker bridge to tailscale
  community.general.ufw:
    rule: allow
    from_ip: "{{ firewall_docker_bridge_subnet }}"
    to_ip: 100.0.0.0/8
  when: firewall_docker_bridge_subnet is defined
  notify: reload ufw

- name: deny ssh traffic outside of tailscale
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    delete: true
  notify: reload ufw
