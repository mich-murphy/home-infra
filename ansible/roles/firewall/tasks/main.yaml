---
- name: install firewall
  ansible.builtin.apt:
    name: ufw
    state: present
    lock_timeout: 300

- name: enable ufw
  community.general.ufw:
    state: enabled

- name: deny incoming traffic
  community.general.ufw:
    default: deny
    direction: incoming

- name: allow outgoing traffic
  community.general.ufw:
    default: allow
    direction: outgoing

- name: allow traffic over tailscale
  community.general.ufw:
    rule: allow
    interface_in: tailscale0
  notify: reload ufw

- name: allow configured inbound ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from | default('any') }}"
  loop: "{{ firewall_allow_ports | default([]) }}"
  notify: reload ufw

# Docker-published ports bypass ufw default-deny; filter them in DOCKER-USER.
- name: allowlist docker published ports in DOCKER-USER
  ansible.builtin.blockinfile:
    path: /etc/ufw/after.rules
    marker: "# {mark} ANSIBLE MANAGED BLOCK: docker published-port allowlist"
    block: |
      *filter
      :DOCKER-USER - [0:0]
      -A DOCKER-USER -m conntrack --ctstate RELATED,ESTABLISHED -j RETURN
      -A DOCKER-USER -m conntrack --ctstate INVALID -j DROP
      {% for entry in firewall_docker_allowed_ports %}
      -A DOCKER-USER -i {{ firewall_docker_external_interface }} -p {{ entry.proto }} -m conntrack --ctdir ORIGINAL --ctorigdstport {{ entry.port }} -j RETURN
      {% endfor %}
      -A DOCKER-USER -i {{ firewall_docker_external_interface }} -m conntrack --ctstate NEW -j DROP
      -A DOCKER-USER -j RETURN
      COMMIT
  when: firewall_docker_allowed_ports is defined
  notify:
    - flush docker-user chain
    - reload ufw

# docker-host only: lets containers reach services whose names resolve to
# Tailscale addresses, such as *.local.elmurphy.com.
- name: allow internal docker bridge to tailscale
  community.general.ufw:
    rule: allow
    from_ip: "{{ firewall_docker_bridge_subnet }}"
    to_ip: 100.64.0.0/10
  when: firewall_docker_bridge_subnet is defined
  notify: reload ufw

# SSH stays reachable via tailscale0.
- name: delete bare 22/tcp allow rule
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    delete: true
  notify: reload ufw
