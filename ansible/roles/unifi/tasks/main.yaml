---
- name: install UniFi OS Server prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - podman
      - qemu-guest-agent
      - slirp4netns
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 300

- name: enable and start QEMU guest agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: download UniFi OS Server installer
  ansible.builtin.get_url:
    url: "{{ unifi_os_server_download_url }}"
    dest: "{{ unifi_os_server_installer_path }}"
    # update checksum whenever unifi_os_server_download_url changes
    checksum: "sha256:db17656f222d371da5f96ed104e33503be16ca755817f126409b67d8009b1419"
    mode: "0755"

- name: install UniFi OS Server
  ansible.builtin.command:
    cmd: "{{ unifi_os_server_installer_path }}"
    creates: /usr/local/bin/uosserver
    stdin: "y\n"

- name: enable and start UniFi OS Server
  ansible.builtin.systemd:
    name: uosserver
    enabled: true
    state: started
