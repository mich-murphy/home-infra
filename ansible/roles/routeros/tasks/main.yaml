---
# Lockout-safe ordering matters: membership and allow rules are reconciled before hardening flips.
- name: Harden the management plane (disable telnet/cleartext, pin services to MGMT)
  ansible.builtin.import_tasks: services.yaml
  tags: [services]

# Bring up the out-of-band port early so it is available as the safety net before any
# of the VLAN/bridge work (and well before the gated vlan-filtering flip).
- name: Out-of-band management port (off the bridge, own /30)
  ansible.builtin.import_tasks: oob.yaml
  tags: [oob]

- name: VLAN interfaces + gateway IPs
  ansible.builtin.import_tasks: vlans.yaml
  tags: [vlans]

- name: DMZ physical interface (de-bridge + gateway)
  ansible.builtin.import_tasks: dmz.yaml
  when: routeros_enable_dmz | bool
  tags: [dmz]

- name: DHCP servers, pools and networks
  ansible.builtin.import_tasks: dhcp.yaml
  tags: [dhcp]

- name: Firewall address-lists, filter matrix and NAT
  ansible.builtin.import_tasks: firewall.yaml
  tags: [firewall]

- name: Bridge VLAN membership + filtering (lockout-risk flip is gated)
  ansible.builtin.import_tasks: bridge.yaml
  tags: [bridge]
