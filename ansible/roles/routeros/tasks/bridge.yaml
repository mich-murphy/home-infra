---
- name: Tag production VLANs on the trunk ports
  community.routeros.api_modify:
    path: interface bridge vlan
    handle_absent_entries: ignore
    data:
      - bridge: "{{ routeros_bridge }}"
        vlan-ids: "{{ item.id }}"
        tagged: "{{ ([routeros_bridge] + routeros_trunk_ports) | join(',') }}"
        comment: "{{ item.name }} (managed: routeros role)"
  loop: "{{ routeros_vlans }}"
  loop_control:
    label: "{{ item.name }} ({{ item.id }})"

# Explicit VLAN 1 entry first: without it the router's bridge IP drops when vlan-filtering flips (lockout).
- name: VLAN 1 (native MGMT) membership — bridge tagged, MGMT ports untagged
  community.routeros.api_modify:
    path: interface bridge vlan
    handle_absent_entries: ignore
    data:
      - bridge: "{{ routeros_bridge }}"
        vlan-ids: 1
        tagged: "{{ routeros_bridge }}"
        untagged: "{{ routeros_vlan1_untagged_ports | join(',') }}"
        comment: "mgmt native (managed: routeros role)"

- name: Set PVID=1 (MGMT native) on the untagged access ports
  community.routeros.api_modify:
    path: interface bridge port
    handle_absent_entries: ignore
    data:
      - bridge: "{{ routeros_bridge }}"
        interface: "{{ item }}"
        pvid: 1
  loop: "{{ routeros_mgmt_untagged_ports }}"

# ⚠️ LOCKOUT RISK. Double-gated: the `routeros_enable_vlan_filtering` var AND the
# `never` tag, so a normal run can never flip it — you must pass `--tags vlan-filtering`
# explicitly. Only do so with the out-of-band port verified reachable and MGMT VLAN-1
# DHCP confirmed working (a 2026-06-03 flip with MGMT on the raw bridge locked everything
# out, and the in-bridge console fallback died with it).
- name: Enable bridge VLAN filtering (LOCKOUT RISK)
  community.routeros.api_modify:
    path: interface bridge
    handle_absent_entries: ignore
    data:
      - name: "{{ routeros_bridge }}"
        vlan-filtering: true
  when: routeros_enable_vlan_filtering | bool
  tags: [never, vlan-filtering]
