---
# Managed forward rules are reconciled as one ordered subset; unrelated defconf/WAN rules are left alone.
# Assumes the default `WAN` interface-list exists.
- name: Address-list of all internal subnets ("internal")
  community.routeros.api_modify:
    path: ip firewall address-list
    handle_absent_entries: ignore
    data:
      - list: internal
        address: "{{ item }}"
        comment: "managed: routeros role"
  loop: "{{ routeros_internal_subnets }}"

- name: Address-list for router management sources
  community.routeros.api_modify:
    path: ip firewall address-list
    handle_absent_entries: remove
    restrict:
      - field: list
        values:
          - router-admin
      - field: comment
        regex: "managed: routeros role"
    data: "{{ _routeros_router_admin_address_list | from_yaml }}"
  vars:
    _routeros_router_admin_address_list: |
      {% for address in routeros_router_admin_sources %}
      - list: router-admin
        address: "{{ address }}"
        comment: "managed: routeros role"
      {% endfor %}

- name: Address-list for privileged routed admin sources
  community.routeros.api_modify:
    path: ip firewall address-list
    handle_absent_entries: remove
    restrict:
      - field: list
        values:
          - admin
      - field: comment
        regex: "managed: routeros role"
    data: "{{ _routeros_admin_address_list | from_yaml }}"
  vars:
    _routeros_admin_address_list: |
      {% for address in routeros_admin_sources %}
      - list: admin
        address: "{{ address }}"
        comment: "managed: routeros role"
      {% endfor %}

# The defconf input chain ends with `drop chain=input in-interface-list=!LAN`. MGMT
# rides the bridge, which defconf already put in LAN, so MGMT DHCP/DNS to the router
# survives. The routed VLAN interfaces, the de-bridged DMZ port and the OOB port are
# NOT in LAN, so their router-bound traffic would hit that drop (the managed input
# accepts below get appended AFTER the defconf drop, so they cannot rescue it). Add
# client VLANs/DMZ for DHCP/DNS and OOB for break-glass router input. Sensitive
# management services stay source-pinned in services.yaml; OOB routed traffic is
# explicitly dropped in the forward chain below.
- name: Add routed VLAN + DMZ interfaces to the LAN interface-list
  community.routeros.api_modify:
    path: interface list member
    handle_absent_entries: ignore
    data:
      - list: LAN
        interface: "{{ item }}"
        comment: "{{ item }} in LAN (managed: routeros role)"
  loop: "{{ routeros_router_lan_interfaces }}"
  loop_control:
    label: "{{ item }}"

- name: Add OOB to the LAN interface-list for router recovery input
  community.routeros.api_modify:
    path: interface list member
    handle_absent_entries: ignore
    data:
      - list: LAN
        interface: "{{ routeros_oob_port }}"
        comment: "oob in LAN for router input (managed: routeros role)"

- name: Input — allow MGMT hosts + the router's own services
  community.routeros.api_modify:
    path: ip firewall filter
    handle_absent_entries: ignore
    data: "{{ _routeros_input_policy | from_yaml }}"
  vars:
    # The router is the DHCP and DNS server for its clients; these inbound services are
    # permitted explicitly as belt-and-suspenders so they survive future input-chain
    # tightening. Function today comes from LAN membership above (these accepts append
    # after the defconf !LAN drop, so they are inert until the chain is reordered).
    # DHCP DISCOVER comes from 0.0.0.0, so
    # scope it by ingress interface (not source address) to keep it off the WAN. MGMT
    # rides the raw bridge (native VLAN 1), the routed VLANs their vlanX interfaces.
    _routeros_input_policy: |
      {% for interface in routeros_lan_input_interfaces %}
      - chain: input
        in-interface: "{{ interface }}"
        protocol: udp
        dst-port: 67,68
        action: accept
        comment: "DHCP to router on {{ interface }} (managed: routeros role)"
      {% endfor %}
      - chain: input
        src-address-list: internal
        protocol: udp
        dst-port: 53
        action: accept
        comment: "DNS udp from internal (managed: routeros role)"
      - chain: input
        src-address-list: internal
        protocol: tcp
        dst-port: 53
        action: accept
        comment: "DNS tcp from internal (managed: routeros role)"
      - chain: input
        protocol: icmp
        action: accept
        comment: "ICMP to router (managed: routeros role)"
      - chain: input
        src-address-list: router-admin
        action: accept
        comment: "MGMT -> router (managed: routeros role)"
      - chain: input
        connection-state: established,related
        action: accept
        comment: "input est/rel (managed: routeros role)"
      - chain: input
        connection-state: invalid
        action: drop
        comment: "input drop invalid (managed: routeros role)"

- name: Require explicit default-drop tag for default-drop enablement
  ansible.builtin.assert:
    that:
      - "'default-drop' in ansible_run_tags"
    fail_msg: "routeros_enable_default_drop=true requires an explicit --tags firewall,default-drop run."
  when: routeros_enable_default_drop | bool

- name: Forward — ordered managed policy
  community.routeros.api_modify:
    path: ip firewall filter
    handle_absent_entries: remove
    ensure_order: true
    restrict:
      - field: chain
        values:
          - forward
      - field: comment
        regex: "managed: routeros role"
    data: "{{ _routeros_forward_policy }}"
  vars:
    _net: "{{ routeros_vlans | items2dict(key_name='name', value_name='subnet') }}"
    _routeros_forward_base_policy: "{{ _routeros_forward_base_policy_yaml | from_yaml }}"
    _routeros_forward_base_policy_yaml: |
      - chain: forward
        connection-state: established,related
        action: accept
        comment: "fwd est/rel (managed: routeros role)"
      - chain: forward
        connection-state: invalid
        action: drop
        comment: "fwd drop invalid (managed: routeros role)"
      - chain: forward
        src-address: "{{ routeros_oob_subnet }}"
        action: drop
        comment: "OOB drop routed traffic (managed: routeros role)"
      - chain: forward
        src-address: "{{ _net.kds }}"
        protocol: tcp
        dst-port: 853
        action: drop
        comment: "KDS drop DoT (managed: routeros role)"
      - chain: forward
        src-address: "{{ _net.kds }}"
        protocol: udp
        dst-port: 853
        action: drop
        comment: "KDS drop DoQ (managed: routeros role)"
      - chain: forward
        src-address: "{{ _net.dflt }}"
        dst-address: "{{ _net.srv }}"
        action: accept
        comment: "DFLT -> SRV services (managed: routeros role)"
      - chain: forward
        src-address: "{{ _net.kds }}"
        dst-address: "{{ _net.srv }}"
        action: accept
        comment: "KDS -> SRV (Plex/Jellyfin) (managed: routeros role)"
      - chain: forward
        src-address: "{{ _net.srv }}"
        dst-address: "{{ routeros_unifi_ctrl }}"
        action: accept
        comment: "SRV -> UniFi controller (managed: routeros role)"
      - chain: forward
        src-address-list: admin
        out-interface-list: WAN
        action: accept
        comment: "MGMT admins -> WAN (managed: routeros role)"
      {% for subnet in routeros_wan_egress_subnets %}
      - chain: forward
        src-address: "{{ subnet }}"
        out-interface-list: WAN
        action: accept
        comment: "{{ subnet }} -> WAN (managed: routeros role)"
      {% endfor %}
    _routeros_default_drop_rule:
      - chain: forward
        action: drop
        comment: "DEFAULT DROP (managed: routeros role)"
    _routeros_forward_policy: >-
      {{
        _routeros_forward_base_policy
        + (_routeros_default_drop_rule if routeros_enable_default_drop | bool else [])
      }}

- name: KDS — redirect plain DNS (53) to the router so the filtered upstream is used
  community.routeros.api_modify:
    path: ip firewall nat
    handle_absent_entries: ignore
    data:
      - chain: dstnat
        src-address: "{{ (routeros_vlans | selectattr('name', 'eq', 'kds') | first).subnet }}"
        protocol: udp
        dst-port: 53
        action: redirect
        to-ports: 53
        comment: "KDS DNS redirect (managed: routeros role)"
      - chain: dstnat
        src-address: "{{ (routeros_vlans | selectattr('name', 'eq', 'kds') | first).subnet }}"
        protocol: tcp
        dst-port: 53
        action: redirect
        to-ports: 53
        comment: "KDS TCP DNS redirect (managed: routeros role)"

- name: Masquerade all internal sources out the WAN
  community.routeros.api_modify:
    path: ip firewall nat
    handle_absent_entries: ignore
    data:
      - chain: srcnat
        out-interface-list: WAN
        action: masquerade
        comment: "masquerade (managed: routeros role)"

- name: Query managed forward rule order
  community.routeros.api:
    path: ip firewall filter
    query: ".id chain action comment WHERE chain == forward"
  register: _routeros_forward_filter
  check_mode: false
  when: routeros_enable_default_drop | bool
  tags: [default-drop]

- name: Assert managed forward rules end in default drop
  ansible.builtin.assert:
    that:
      - _managed_forward_comments | length > 0
      - _managed_forward_comments[-1] == "DEFAULT DROP (managed: routeros role)"
      - _managed_forward_comments | length == _expected_managed_forward_comments | length
      - _managed_forward_comments == _expected_managed_forward_comments
    fail_msg: Managed forward rules are not in the expected order; default-drop must be last.
  vars:
    _managed_forward_comments: >-
      {{
        _routeros_forward_filter.msg
        | selectattr('comment', 'defined')
        | selectattr('comment', 'search', 'managed: routeros role')
        | map(attribute='comment')
        | list
      }}
    _expected_managed_forward_comments: >-
      {{
        [
          "fwd est/rel (managed: routeros role)",
          "fwd drop invalid (managed: routeros role)",
          "OOB drop routed traffic (managed: routeros role)",
          "KDS drop DoT (managed: routeros role)",
          "KDS drop DoQ (managed: routeros role)",
          "DFLT -> SRV services (managed: routeros role)",
          "KDS -> SRV (Plex/Jellyfin) (managed: routeros role)",
          "SRV -> UniFi controller (managed: routeros role)",
          "MGMT admins -> WAN (managed: routeros role)"
        ]
        + (routeros_wan_egress_subnets | map('regex_replace', '$', ' -> WAN (managed: routeros role)') | list)
        + ["DEFAULT DROP (managed: routeros role)"]
      }}
  when: routeros_enable_default_drop | bool
  tags: [default-drop]

- name: Assert no unmanaged accepts are above default drop
  ansible.builtin.assert:
    that:
      - >-
        item.action | default('') != 'accept'
        or (item.comment | default('')) is search('managed: routeros role|defconf')
    fail_msg: "Unmanaged accept rule appears above managed default-drop: {{ item }}"
  loop: "{{ _routeros_forward_filter.msg[:_default_drop_index | int] }}"
  vars:
    _forward_comments: "{{ _routeros_forward_filter.msg | map(attribute='comment', default='') | list }}"
    _default_drop_index: "{{ _forward_comments.index('DEFAULT DROP (managed: routeros role)') }}"
  when: routeros_enable_default_drop | bool
  tags: [default-drop]
