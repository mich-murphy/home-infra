---
- name: Ensure config directories exist
  ansible.builtin.file:
    path: "/home/michael/.config/{{ item }}"
    state: directory
    owner: michael
    group: michael
    mode: '0755'
  become_user: michael
  loop:
    - fish

- name: Deploy fish config
  ansible.builtin.template:
    src: fish/config.fish.j2
    dest: /home/michael/.config/fish/config.fish
    owner: michael
    group: michael
    mode: '0644'
  become_user: michael

- name: Deploy fisher plugin manifest
  ansible.builtin.copy:
    dest: /home/michael/.config/fish/fish_plugins
    content: |
      jorgebucaran/fisher
      jorgebucaran/autopair.fish
      meaningful-ooo/sponge
    owner: michael
    group: michael
    mode: '0644'
  become_user: michael
  register: fish_plugins_manifest

- name: Sync fisher plugins from manifest
  ansible.builtin.command:
    cmd: fish -c 'fisher update'
  become_user: michael
  when: fish_plugins_manifest.changed
  changed_when: true

- name: Deploy starship config
  ansible.builtin.template:
    src: starship.toml.j2
    dest: /home/michael/.config/starship.toml
    owner: michael
    group: michael
    mode: '0644'
  become_user: michael

- name: Deploy OSC 52 clipboard helper
  ansible.builtin.copy:
    src: osc52-copy
    dest: /usr/local/bin/osc52-copy
    owner: root
    group: root
    mode: '0755'

- name: Deploy tmux config
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: /home/michael/.tmux.conf
    owner: michael
    group: michael
    mode: '0644'
  become_user: michael
