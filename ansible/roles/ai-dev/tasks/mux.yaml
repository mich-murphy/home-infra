---
- name: Ensure user systemd directory exists
  ansible.builtin.file:
    path: /home/michael/.config/systemd/user
    state: directory
    owner: michael
    group: michael
    mode: '0755'

- name: Install wezterm-mux-server user service unit
  ansible.builtin.copy:
    src: wezterm-mux-server.service
    dest: /home/michael/.config/systemd/user/wezterm-mux-server.service
    owner: michael
    group: michael
    mode: '0644'

- name: Enable linger for michael
  ansible.builtin.command:
    cmd: loginctl enable-linger michael
  args:
    creates: /var/lib/systemd/linger/michael

- name: Reload user systemd manager
  ansible.builtin.command:
    cmd: systemctl --user --machine=michael@ daemon-reload
  changed_when: false

- name: Enable and start wezterm-mux-server user service
  ansible.builtin.command:
    cmd: systemctl --user --machine=michael@ enable --now wezterm-mux-server.service
  register: mux_enable
  changed_when: "'Created symlink' in mux_enable.stdout or 'Started' in mux_enable.stderr"
