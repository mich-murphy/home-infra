---
- name: Refresh pacman and upgrade system
  community.general.pacman:
    update_cache: true
    upgrade: true

- name: Install official-repo packages and LSPs/formatters
  community.general.pacman:
    state: present
    name:
      - base-devel
      - git
      - fish
      - starship
      - neovim
      - github-cli
      - lazygit
      - ripgrep
      - fd
      - bat
      - eza
      - zoxide
      - direnv
      - just
      - fzf
      - tmux
      - nodejs
      - npm
      - go
      - openssh
      - mosh
      - btop
      - sd
      - jq
      - tree
      - procs
      - rsync
      - curl
      - wget
      - stylua
      - gopls
      - delve
      - ruff
      - markdownlint-cli

- name: Bootstrap paru AUR helper
  kewlfft.aur.aur:
    use: makepkg
    name: paru
    state: present
  become: true
  become_user: michael

- name: Install AUR packages
  kewlfft.aur.aur:
    use: paru
    name:
      - ouch
      - tflint
      - marksman
      - fisher
    state: present
  become: true
  become_user: michael

- name: Install Determinate Nix
  ansible.builtin.shell:
    cmd: curl -fsSL https://install.determinate.systems/nix | sh -s -- install linux --determinate --no-confirm
  args:
    creates: /nix/var/nix/profiles/default/bin/nix

- name: Remove npm-global Claude Code (migrated to native installer)
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: absent

- name: Install Claude Code via native installer (per-user, self-updating)
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: /home/michael/.local/bin/claude
  become: true
  become_user: michael

- name: Set login shell to fish for michael
  ansible.builtin.user:
    name: michael
    shell: /usr/bin/fish

- name: Enable linger for michael (keeps tmux sessions alive across ssh logout)
  ansible.builtin.command:
    cmd: loginctl enable-linger michael
  args:
    creates: /var/lib/systemd/linger/michael

- name: Ensure systemd-logind drop-in dir exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Keep user processes alive after ssh logout (mosh-server survival)
  ansible.builtin.copy:
    dest: /etc/systemd/logind.conf.d/ai-dev.conf
    content: |
      [Login]
      KillUserProcesses=no
    owner: root
    group: root
    mode: '0644'
  notify: restart systemd-logind

- name: Ensure en_AU.UTF-8 line uncommented in /etc/locale.gen
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^\s*#?\s*en_AU\.UTF-8\s+UTF-8\s*$'
    line: 'en_AU.UTF-8 UTF-8'
    state: present
  register: locale_gen_line

- name: Regenerate locales
  ansible.builtin.command:
    cmd: locale-gen
  when: locale_gen_line.changed

- name: Set system locale to en_AU.UTF-8
  ansible.builtin.copy:
    dest: /etc/locale.conf
    content: "LANG=en_AU.UTF-8\n"
    owner: root
    group: root
    mode: '0644'
