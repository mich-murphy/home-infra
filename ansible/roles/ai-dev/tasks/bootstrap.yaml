---
- name: Refresh pacman and upgrade system
  community.general.pacman:
    update_cache: true
    upgrade: true

- name: Install official-repo packages and LSPs/formatters
  community.general.pacman:
    state: present
    name:
      - base-devel
      - git
      - fish
      - starship
      - neovim
      - github-cli
      - lazygit
      - ripgrep
      - fd
      - bat
      - eza
      - zoxide
      - direnv
      - just
      - fzf
      - tmux
      - nodejs
      - npm
      - go
      - openssh
      - mosh
      - btop
      - sd
      - jq
      - tree
      - procs
      - rsync
      - curl
      - wget
      - stylua
      - gopls
      - delve
      - ruff
      - markdownlint-cli

- name: Bootstrap paru AUR helper
  kewlfft.aur.aur:
    use: makepkg
    name: paru
    state: present
  become: true
  become_user: michael

- name: Install AUR packages
  kewlfft.aur.aur:
    use: paru
    name:
      - ouch
      - tflint
      - marksman
    state: present
  become: true
  become_user: michael

- name: Install Claude Code CLI globally
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: present

- name: Set login shell to fish for michael
  ansible.builtin.user:
    name: michael
    shell: /usr/bin/fish

- name: Enable linger for michael (keeps tmux sessions alive across ssh logout)
  ansible.builtin.command:
    cmd: loginctl enable-linger michael
  args:
    creates: /var/lib/systemd/linger/michael

- name: Ensure en_AU.UTF-8 locale entry in /etc/locale.gen
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^#?\s*en_AU\.UTF-8 UTF-8'
    line: 'en_AU.UTF-8 UTF-8'
    state: present
  register: locale_gen_entry

- name: Regenerate locales when locale.gen changed
  ansible.builtin.command:
    cmd: locale-gen
  when: locale_gen_entry.changed

- name: Set system locale to en_AU.UTF-8
  ansible.builtin.copy:
    dest: /etc/locale.conf
    content: "LANG=en_AU.UTF-8\n"
    owner: root
    group: root
    mode: '0644'
