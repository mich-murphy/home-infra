---
# Network data for the `routeros` role (tasks are non-destructive; see role README).
# OPEN ITEMS to verify on the live router: interface/bridge names, admin + IPMI IPs,
# KDS DNS choice. Create a restricted API user first (creds in vaulted secrets.yaml):
#   /user group add name=ansible policy=api,read,write,policy,test,sensitive
#   /user add name=ansible group=ansible password=<vaulted>
routeros_api_host: 10.77.1.1

# Run the API modules on the same interpreter as ansible-playbook (this nix shell,
# which has librouteros) instead of letting interpreter discovery pick another python.
ansible_python_interpreter: "{{ ansible_playbook_python }}"

# L2 topology — verify names with `/interface print`.
routeros_bridge: bridge
routeros_trunk_ports: # tagged production VLANs (native/untagged = MGMT VLAN 1)
  - ether3 # Proxmox eno2 (vmbr0 trunk)
  - ether4 # UniFi U6-Pro uplink
routeros_mgmt_untagged_ports:
  - ether5 # Proxmox IPMI/BMC — untagged MGMT access (already a bridge member)
routeros_dmz_port: ether2 # Proxmox eno1 (vmbr1); MUST be removed from the bridge for isolation

# Ports that carry untagged native MGMT (VLAN 1) once vlan-filtering is on. The trunks
# (native) + IPMI access + the free ether6/ether7 (wired console-fallback during the flip).
# The bridge itself is the tagged member so the router's 10.77.1.1 stays reachable.
routeros_vlan1_untagged_ports:
  - ether3 # Proxmox trunk (native MGMT)
  - ether4 # UniFi AP trunk (native MGMT)
  - ether5 # IPMI access
  - ether6 # free — wired console fallback
  - ether7 # free — wired console fallback

# MGMT = existing flat network (kept as-is, referenced by the firewall).
routeros_mgmt_subnet: 10.77.1.0/24
# Sources allowed to reach the encrypted management services (ssh/winbox/api-ssl/www-ssl).
# Defaults to MGMT; add Tailscale CGNAT (100.64.0.0/10) here if you manage off-LAN.
routeros_mgmt_admin_sources: 10.77.1.0/24
routeros_admin_station: 10.77.1.241 # this Mac (MGMT) — see note: DHCP, reserve a lease before default-drop
routeros_ipmi_host: 10.77.1.99 # Proxmox IPMI/BMC
routeros_unifi_ctrl: 10.77.1.10

# Production VLANs (tagged on the trunk bridge). MGMT/VLAN 1 is the untagged net.
routeros_vlans:
  - { id: 20, name: srv, subnet: 10.77.20.0/24, gateway: 10.77.20.1, pool_start: 10.77.20.50, pool_end: 10.77.20.250 }
  - { id: 30, name: dflt, subnet: 10.77.30.0/24, gateway: 10.77.30.1, pool_start: 10.77.30.50, pool_end: 10.77.30.250 }
  - { id: 50, name: kds, subnet: 10.77.50.0/24, gateway: 10.77.50.1, pool_start: 10.77.50.50, pool_end: 10.77.50.250, dns: "{{ routeros_kids_dns }}" }
  - { id: 60, name: gst, subnet: 10.77.60.0/24, gateway: 10.77.60.1, pool_start: 10.77.60.50, pool_end: 10.77.60.250 }

# DMZ — dedicated physical port, no VLAN tag.
routeros_dmz:
  name: dmz
  subnet: 10.77.99.0/24
  gateway: 10.77.99.1
  pool_start: 10.77.99.50
  pool_end: 10.77.99.250

routeros_default_dns: 10.77.1.1
routeros_kids_dns: 1.1.1.3 # OPEN ITEM: Cloudflare Families / NextDNS / AdGuard

# Disruptive / lockout-risk steps — gated by var + tag, skipped on a normal run. See README.
routeros_enable_dmz: false # de-bridges ether2 + renumbers ai-dev VMs into 10.77.99.0/24
routeros_enable_vlan_filtering: false
routeros_enable_default_drop: false
# Auto-revert scheduler for the flip. Needs device-mode scheduler=yes (physical
# confirmation at the router); off by default — rely on a wired MGMT console fallback.
routeros_vlan_filter_failsafe: false
