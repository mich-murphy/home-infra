username: mm
ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIH1TgAtlovn+B5ojfw7JRFDi8UxcTkHym30wEg6jekF

swap_mode: file
swap_size_gb: 4
swap_swappiness: 10

# Allows containers on the compose proxy bridge to reach services via
# *.local.elmurphy.com, which currently resolves to Tailscale.
firewall_docker_bridge_subnet: 172.20.1.0/24

# Published Docker ports must be allowlisted in DOCKER-USER.
firewall_docker_allowed_ports:
  - {port: 80, proto: tcp}  # traefik
  - {port: 443, proto: tcp}  # traefik
  - {port: 9443, proto: tcp}  # portainer escape hatch
  - {port: 8096, proto: tcp}  # jellyfin
  - {port: 25565, proto: tcp}  # qbittorrent peers
  - {port: 25565, proto: udp}  # qbittorrent peers
