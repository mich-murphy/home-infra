apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync-system
spec:
  releaseName: volsync
  interval: 12h
  chart:
    spec:
      chart: volsync
      version: "0.16.0"
      sourceRef:
        kind: HelmRepository
        name: backube
        namespace: volsync-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
