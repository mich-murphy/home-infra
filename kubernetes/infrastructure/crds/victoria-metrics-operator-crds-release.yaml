apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-operator-crds
  namespace: flux-system
spec:
  releaseName: victoria-metrics-operator-crds
  interval: 12h
  chart:
    spec:
      chart: victoria-metrics-operator-crds
      version: "0.10.1"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
