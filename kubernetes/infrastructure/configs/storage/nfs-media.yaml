# Static binding to the existing TrueNAS exports (mirrors the docker-host
# fstab mounts). Capacities are nominal — NFS does not enforce them.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-media
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.2
    - hard
  nfs:
    server: 10.77.20.101
    path: /mnt/slow/media
  claimRef:
    namespace: media
    name: nfs-media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-media
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nfs-media
  resources:
    requests:
      storage: 1Ti
---
