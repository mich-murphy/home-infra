# Point-in-time consistent backup; the db PVC is deliberately not
# volsync'd — restores come from these dumps.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: owncloud-db-backup
  namespace: tools
spec:
  schedule: "35 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: owncloud-db-backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: owncloud-db-backup
              image: mariadb:12.3.2@sha256:628f228f0fd5913a220438693576b29b6fe4dc1fa0a1298c0e98579fae28635f
              command:
                - sh
                - -c
                # %u keeps one dump per weekday, overwritten weekly.
                - mariadb-dump -h owncloud-mariadb -u root --all-databases | gzip > "/backup/owncloud-$(date +%u).sql.gz"
              env:
                - name: MYSQL_PWD
                  valueFrom:
                    secretKeyRef:
                      name: owncloud-credentials
                      key: db-password
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  memory: 128Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: backup
              nfs:
                server: 10.77.20.101
                path: /mnt/slow/backups/dumps
