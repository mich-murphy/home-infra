apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: tools
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wallabag
          image: wallabag/wallabag:2.6.14@sha256:4a527e027e0d59e87c14225ef11e005af3d4890374202ad319ce5e63dfc66709
          ports:
            - containerPort: 80
          env:
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_pgsql
            - name: SYMFONY__ENV__DATABASE_HOST
              value: wallabag-db
            - name: SYMFONY__ENV__DATABASE_PORT
              value: "5432"
            - name: SYMFONY__ENV__DATABASE_NAME
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_USER
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-credentials
                  key: db-password
            - name: SYMFONY__ENV__DATABASE_CHARSET
              value: utf8
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: https://wallabag.local.elmurphy.com
            - name: SYMFONY__ENV__SERVER_NAME
              value: '"Wallabag"'
            # Image default is the bare hostname "redis"; point at the service.
            - name: SYMFONY__ENV__REDIS_HOST
              value: wallabag-redis
          livenessProbe:
            httpGet:
              path: /api/info
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/info
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # Entrypoint starts as root, drops to nobody, and binds port 80.
              add:
                - CHOWN
                - SETUID
                - SETGID
                - DAC_OVERRIDE
                - FOWNER
                - KILL
                - NET_BIND_SERVICE
          volumeMounts:
            - name: data
              mountPath: /var/www/wallabag/web/assets/images
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wallabag-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag-db
  namespace: tools
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wallabag-db
  template:
    metadata:
      labels:
        app: wallabag-db
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wallabag-db
          image: postgres:18@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: wallabag
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-credentials
                  key: db-password
            - name: POSTGRES_DB
              value: wallabag
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - wallabag
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - wallabag
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # Entrypoint starts as root and drops to the postgres user.
              add:
                - CHOWN
                - SETUID
                - SETGID
                - DAC_OVERRIDE
                - FOWNER
                - KILL
          volumeMounts:
            - name: db
              mountPath: /var/lib/postgresql
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: wallabag-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag-redis
  namespace: tools
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wallabag-redis
  template:
    metadata:
      labels:
        app: wallabag-redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wallabag-redis
          image: redis:8.8.0-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # Entrypoint starts as root and drops to the redis user.
              add:
                - CHOWN
                - SETUID
                - SETGID
                - DAC_OVERRIDE
                - FOWNER
                - KILL
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi
