apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
  namespace: auth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pocket-id
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2.11.0@sha256:b7c37ab3044e53fd29b5f7295eebff5fdc0367dc043f36b41bcbe1815fcd965d
          ports:
            - containerPort: 1411
          env:
            - name: APP_URL
              value: https://pocket-id.local.elmurphy.com
            - name: TRUST_PROXY
              value: "true"
            - name: ANALYTICS_DISABLED
              value: "true"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-credentials
                  key: encryption-key
            - name: MAXMIND_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-credentials
                  key: maxmind-license-key
          livenessProbe:
            httpGet:
              path: /healthz
              port: 1411
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 1411
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETUID
                - SETGID
                - DAC_OVERRIDE
                - FOWNER
                - KILL
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pocket-id-data
