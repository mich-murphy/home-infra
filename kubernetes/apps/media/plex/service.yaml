apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: media
spec:
  ports:
    - port: 32400
  selector:
    app: plex
---
# Dedicated LB IP for remote access and app direct play (bypasses the gateway).
apiVersion: v1
kind: Service
metadata:
  name: plex-direct
  namespace: media
  annotations:
    io.cilium/lb-ipam-ips: "10.77.20.226"
spec:
  type: LoadBalancer
  ports:
    - port: 32400
      protocol: TCP
  selector:
    app: plex
