apiVersion: batch/v1
kind: CronJob
metadata:
  name: kometa
  namespace: media
spec:
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: kometa
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kometa
              image: kometateam/kometa:v2.4.5@sha256:a376a1818196cde159b5a4d5a6ad55411415f7b5bc38d8a27e8c718bae7f0ddd
              # Run one pass and exit; the CronJob replaces kometa's internal scheduler.
              args:
                - --run
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: config
                  mountPath: /config
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 768Mi
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: kometa-data
