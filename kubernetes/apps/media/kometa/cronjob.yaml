apiVersion: batch/v1
kind: CronJob
metadata:
  name: kometa
  namespace: media
spec:
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: kometa
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kometa
              image: kometateam/kometa:v2.3.1@sha256:683c04827ef3fecf1cc5cb178f75f91f968aef6c6d89d34bc9c70966fd1d7259
              # Run one pass and exit; the CronJob replaces kometa's internal scheduler.
              args:
                - --run
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: config
                  mountPath: /config
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 768Mi
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: kometa-data
