apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr-volsync
  namespace: media
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-secrets
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      data:
        RESTIC_REPOSITORY: /mnt/repository/radarr
        RESTIC_PASSWORD: "{{ .resticPassword }}"
  data:
    - secretKey: resticPassword
      remoteRef:
        key: volsync/restic-password
---
# Nightly config backup to the TrueNAS volsync export. Direct copy is not
# point-in-time consistent; apps with databases pair this with a dump job.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: radarr
  namespace: media
spec:
  sourcePVC: radarr-data
  trigger:
    schedule: "0 3 * * *"
  restic:
    repository: radarr-volsync
    copyMethod: Direct
    pruneIntervalDays: 14
    retain:
      daily: 7
      weekly: 4
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 1215
      runAsGroup: 1215
      fsGroup: 1215
    moverVolumes:
      - name: repository
        mountPath: repository
        volumeSource:
          nfs:
            server: 10.77.20.101
            path: /mnt/slow/backups/volsync
