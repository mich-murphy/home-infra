apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sabnzbd
          image: ghcr.io/linuxserver/sabnzbd:5.0.4-ls259@sha256:cfdc4199329e1c6a0c1af3335cbb6ab224bd9adaaad1b75bffe5b6e2c77e57c3
          ports:
            - containerPort: 8080
          env:
            - name: PUID
              value: "1215"
            - name: PGID
              value: "1215"
            - name: TZ
              value: Australia/Melbourne
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # LSIO s6 init starts as root and drops to PUID/PGID.
              add:
                - CHOWN
                - SETUID
                - SETGID
                - DAC_OVERRIDE
                - FOWNER
                - KILL
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data/usenet
              subPath: usenet
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sabnzbd-data
        - name: media
          persistentVolumeClaim:
            claimName: nfs-media
