---
services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.35.1@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
    container_name: audiobookshelf
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - proxy
    environment:
      - TZ=${TZ}
    volumes:
      - type: bind
        source: /mnt/audiobooks
        target: /data/audiobooks
        bind:
          propagation: rslave
      - audiobookshelf-data:/config
      - audiobookshelf-metadata:/metadata
    labels:
      - traefik.enable=true
      - traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.local.elmurphy.com`)
      - traefik.http.routers.audiobookshelf.tls=true
      - traefik.http.services.audiobookshelf.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
volumes:
  audiobookshelf-data:
    name: audiobookshelf-data
  audiobookshelf-metadata:
    name: audiobookshelf-metadata

networks:
  proxy:
    external: true
