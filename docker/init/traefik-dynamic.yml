---
tls:
  options:
    modern:
      minVersion: VersionTLS13
      sniStrict: true
      curvePreferences:
        - X25519
        - CurveP256
        - CurveP384
    intermediate:
      cipherSuites:
        - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
      minVersion: "VersionTLS12"
      sniStrict: true
      curvePreferences:
        - X25519
        - CurveP256
        - CurveP384
http:
  serversTransports:
    # only for the truenas backend with a self-signed cert; never global
    insecure-internal:
      insecureSkipVerify: true
  routers:
    truenas:
      entryPoints:
        - "websecure"
      rule: "Host(`truenas.local.elmurphy.com`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: truenas
  services:
    truenas:
      loadBalancer:
        servers:
          - url: "https://10.77.20.101"
        passHostHeader: true
        serversTransport: insecure-internal
  middlewares:
    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true
    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
    default-whitelist:
      ipAllowList:
        sourceRange:
        - "100.64.0.0/10"
        - "10.77.1.0/24"
        - "172.20.1.0/24"
    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers
