---
services:
  portainer:
    image: portainer/portainer-ee:lts@sha256:4f156214efb9260c7324bc73af37e4c57499259c25496f16341886cef3f9e268
    container_name: portainer
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    extra_hosts:
      # Portainer performs OAuth token exchange server-side; keep that traffic
      # inside the proxy network instead of the Tailscale-resolved address.
      - pocket-id.local.elmurphy.com:172.20.1.13
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      # escape hatch when traefik is down; allowlisted in firewall_docker_allowed_ports
      - 9443:9443
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`portainer.local.elmurphy.com`)
      - traefik.http.routers.portainer.tls=true
      - traefik.http.services.portainer.loadbalancer.server.port=9000
    depends_on:
      - traefik
    restart: unless-stopped

  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: docker-socket-proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    # entrypoint renders haproxy.cfg into /tmp; haproxy writes its pidfile to /run
    tmpfs:
      - /tmp
      - /run
    networks:
      - docker-socket-proxy
    environment:
      - CONTAINERS=1
      - EVENTS=1
      - PING=1
      - POST=0
      - VERSION=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  traefik:
    image: traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    container_name: traefik
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - docker-socket-proxy
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - CF_API_EMAIL=${CF_API_EMAIL}
    volumes:
      - traefik-data:/letsencrypt
      - ./traefik.yml:/traefik.yml:ro
      - ./traefik-dynamic.yml:/traefik-dynamic.yml:ro
    ports:
      - 80:80
      - 443:443
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-secure.entrypoints=websecure
      - traefik.http.routers.traefik-secure.rule=Host(`traefik.local.elmurphy.com`)
      - traefik.http.routers.traefik-secure.tls=true
      - traefik.http.routers.traefik-secure.tls.certresolver=cloudflare
      - traefik.http.routers.traefik-secure.tls.domains[0].main=local.elmurphy.com
      - traefik.http.routers.traefik-secure.tls.domains[0].sans=*.local.elmurphy.com
      - traefik.http.routers.traefik-secure.service=api@internal
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - docker-socket-proxy
    restart: unless-stopped

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.9.0@sha256:a2a38a96699d7483d65b5849b015d954f294938306a03a9c0699bc5b79554e86
    container_name: pocket-id
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - APP_URL=https://pocket-id.local.elmurphy.com
      - TRUST_PROXY=true
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - PUID=1000
      - PGID=1000
      - ANALYTICS_DISABLED=true
    volumes:
      - pocketid-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.pocket-id.rule=Host(`pocket-id.local.elmurphy.com`)
      - traefik.http.routers.pocket-id.tls=true
      - traefik.http.services.pocket-id.loadbalancer.server.port=1411
    healthcheck:
      test: "curl -f http://localhost:1411/healthz"
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    depends_on:
      - traefik
    restart: unless-stopped

volumes:
  portainer-data:
    name: portainer-data
  traefik-data:
    name: traefik-data
  pocketid-data:
    name: pocketid-data

networks:
  proxy:
    name: proxy
    ipam:
      config:
        - subnet: 172.20.1.0/24
  docker-socket-proxy:
    name: docker-socket-proxy
    internal: true
