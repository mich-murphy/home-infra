      retries: 3
      start_period: 30s
    restart: unless-stopped

  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:2.4.0.5397-ls152@sha256:3e9bd62ca90c97c5df75b7012e10a29f6926e62807deeddc1dc89e6e2fd141e1
    container_name: prowlarr
    security_opt:
