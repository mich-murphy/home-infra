---
services:
  # NOTE: visit https://<server-ip>:32400/web to setup new server
  plex:
    image: plexinc/pms-docker:1.43.2.10687-563d026ea@sha256:c37106c57fed7a6624f5dee5a3ce460ff011f09a2aa7f4ee9e8dbbd08ae1b87e
    container_name: plex
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    networks:
      - proxy
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - plex-data:/config
      - plex-transcode:/transcode
      - type: bind
        source: /mnt/data/media
        target: /data/media
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: /mnt/music
        target: /data/music
        read_only: true
        bind:
          propagation: rslave
    labels:
      - traefik.enable=true
      - traefik.http.routers.plex.rule=Host(`plex.local.elmurphy.com`)
      - traefik.http.routers.plex.tls=true
      - traefik.http.services.plex.loadbalancer.server.port=32400
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:32400/identity"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  tautulli:
    image: ghcr.io/linuxserver/tautulli:v2.17.2-ls235@sha256:fb1a686e4b676af3bd8f6e1a5a0097ee1540015768e9bbd4445e130d703a68cd
    container_name: tautulli
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    networks:
      - proxy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - tautulli-data:/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.tautulli.rule=Host(`tautulli.local.elmurphy.com`)
      - traefik.http.routers.tautulli.tls=true
      - traefik.http.services.tautulli.loadbalancer.server.port=8181
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8181/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:v3.3.0@sha256:c92d2dc117f62185e7bcb88cd56efd374ea79210eaf433275449e8d5988eb5a8
    container_name: seerr
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - proxy
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    volumes:
      - seerr-data:/app/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.seerr.rule=Host(`seerr.local.elmurphy.com`)
      - traefik.http.routers.seerr.tls=true
      - traefik.http.services.seerr.loadbalancer.server.port=5055
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5055/api/v1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Manually setup initial config
  # Reference: https://kometa.wiki/en/latest/kometa/install/walkthroughs/docker/#setting-up-the-initial-config-file
  kometa:
    image: kometateam/kometa:v2.4.4@sha256:90e53a6bdf9343d63702767f8f6d6da09902e7bd174850120ac50d39a0722ff1
    container_name: kometa
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - proxy
    volumes:
      - kometa-data:/config:rw
    # no healthcheck: kometa is a scheduled batch job, not a long-running server
    restart: unless-stopped

volumes:
  plex-data:
    name: plex-data
  plex-transcode:
    name: plex-transcode
  tautulli-data:
    name: tautulli-data
  seerr-data:
    name: seerr-data
  kometa-data:
    name: kometa-data

networks:
  proxy:
    external: true
