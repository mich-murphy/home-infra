---
services:
  owncloud:
    image: owncloud/server:10.16.3@sha256:111bcabfd821aa663a050671669dca8dd71d62e30fa689ec6d3d46dba3997ea8
    container_name: owncloud
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    networks:
      - proxy
      - owncloud-backend
    environment:
      - OWNCLOUD_DOMAIN=owncloud.local.elmurphy.com
      - OWNCLOUD_TRUSTED_DOMAINS=owncloud.local.elmurphy.com
      - OWNCLOUD_DB_TYPE=mysql
      - OWNCLOUD_DB_NAME=owncloud
      - OWNCLOUD_DB_USERNAME=owncloud
      - OWNCLOUD_DB_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - OWNCLOUD_DB_PREFIX=oc_
      - OWNCLOUD_DB_HOST=owncloud-mariadb
      - OWNCLOUD_ADMIN_USERNAME=${ADMIN_USERNAME}
      - OWNCLOUD_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OWNCLOUD_MYSQL_UTF8MB4=true
      - OWNCLOUD_REDIS_ENABLED=true
      - OWNCLOUD_REDIS_HOST=owncloud-redis
    volumes:
      - owncloud-data:/mnt/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.owncloud.rule=Host(`owncloud.local.elmurphy.com`)
      - traefik.http.routers.owncloud.tls=true
      - traefik.http.services.owncloud.loadbalancer.server.port=8080
    depends_on:
      owncloud-mariadb:
        condition: service_healthy
      owncloud-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  owncloud-mariadb:
    image: mariadb:12.3.2@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b # minimum required ownCloud version is 10.9
    container_name: owncloud-mariadb
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    networks:
      - owncloud-backend
    environment:
      - MYSQL_ROOT_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - MYSQL_USER=owncloud
      - MYSQL_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=owncloud
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - owncloud-db:/var/lib/mysql
    command: ["--max-allowed-packet=128M", "--innodb-log-file-size=64M"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  owncloud-redis:
    image: redis:8.8.0@sha256:0a972391db0b24ec336e35d1bc98b237237e26f82bf5120cf2f6b1688d1df973
    container_name: owncloud-redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - SETPCAP
    networks:
      - owncloud-backend
    volumes:
      - owncloud-cache:/data
    command: ["--databases", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  owncloud-data:
    name: owncloud-data
  owncloud-db:
    name: owncloud-db
  owncloud-cache:
    name: owncloud-cache

networks:
  proxy:
    external: true
  owncloud-backend:
    name: owncloud-backend
    internal: true
    ipam:
      config:
        - subnet: 172.40.1.0/24
