---
services:
  owncloud:
    image: owncloud/server:10.16.2@sha256:17a9b3dd9200abd3bb33aa9c55463822c43ad277a74a831766310e4e3399ae15
    container_name: owncloud
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - owncloud-backend
    environment:
      - OWNCLOUD_DOMAIN=owncloud.local.elmurphy.com
      - OWNCLOUD_TRUSTED_DOMAINS=owncloud.local.elmurphy.com
      - OWNCLOUD_DB_TYPE=mysql
      - OWNCLOUD_DB_NAME=owncloud
      - OWNCLOUD_DB_USERNAME=owncloud
      - OWNCLOUD_DB_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - OWNCLOUD_DB_HOST=owncloud-mariadb
      - OWNCLOUD_ADMIN_USERNAME=${ADMIN_USERNAME}
      - OWNCLOUD_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OWNCLOUD_MYSQL_UTF8MB4=true
      - OWNCLOUD_REDIS_ENABLED=true
      - OWNCLOUD_REDIS_HOST=owncloud-redis
    volumes:
      - owncloud-data:/mnt/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.owncloud.rule=Host(`owncloud.local.elmurphy.com`)
      - traefik.http.routers.owncloud.tls=true
      - traefik.http.services.owncloud.loadbalancer.server.port=8080
    depends_on:
      - owncloud-mariadb
      - owncloud-redis
    healthcheck:
      test: ["CMD", "/usr/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  owncloud-mariadb:
    image: mariadb:12.2.2@sha256:e0236fc6386e7eacd9359e59d0a078bd7aa0d18280d36d13061121bedeaee903 # minimum required ownCloud version is 10.9
    container_name: owncloud-mariadb
    security_opt:
      - no-new-privileges:true
    networks:
      - owncloud-backend
    environment:
      - MYSQL_ROOT_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - MYSQL_USER=owncloud
      - MYSQL_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=owncloud
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - owncloud-db:/var/lib/mysql
    command: ["--max-allowed-packet=128M", "--innodb-log-file-size=64M"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  owncloud-redis:
    image: redis:8@sha256:e628485c98f8cfe942d8b6f34d461dabf069884bf18932ccbdd9dd9af20b1acc
    container_name: owncloud-redis
    security_opt:
      - no-new-privileges:true
    networks:
      - owncloud-backend
    volumes:
      - owncloud-cache:/data
    command: ["--databases", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  owncloud-data:
    name: owncloud-data
  owncloud-db:
    name: owncloud-db
  owncloud-cache:
    name: owncloud-cache

networks:
  proxy:
    external: true
  owncloud-backend:
    name: owncloud-backend
    internal: true
    ipam:
      config:
        - subnet: 172.40.1.0/24
