---
services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
    container_name: jellyfin
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: 1000:1000
    networks:
      - proxy
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - 992 # render group
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.local.elmurphy.com
    volumes:
      - jellyfin-data:/config
      - jellyfin-cache:/cache
      - type: bind
        source: /mnt/data/media
        target: /data/media
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: /mnt/music
        target: /data/music
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: /mnt/music
        target: /data/media/music
        read_only: true
        bind:
          propagation: rslave
    tmpfs:
      - /transcode:rw,nosuid,nodev,noexec,uid=1000,gid=1000,mode=1777,size=2g # ram transcode
    ports:
      # deliberate direct LAN access; allowlisted in firewall_docker_allowed_ports
      - 8096:8096
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.local.elmurphy.com`)
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8096/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  jellyfin-data:
    name: jellyfin-data
  jellyfin-cache:
    name: jellyfin-cache

networks:
  proxy:
    external: true
