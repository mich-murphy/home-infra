---
services:
  # NOTE: Default user is admin and password printed in container log
  # need to update the user/password from webui otherwise password will be regenerated
  # reference: https://docs.linuxserver.io/images/docker-qbittorrent/#application-setup
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r3-ls453@sha256:c9990949e968e99333f47f49da7d16e81ba6e1469c8c46807a65b984c9e8b6ff
    container_name: qbittorrent
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    memswap_limit: 1g
    networks:
      - proxy
    environment:
      - PUID=1215
      - PGID=1215
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=25565
    volumes:
      - qbittorrent-data:/config
      - /mnt/data/torrents:/data/torrents:rw
    ports:
      - 25565:25565
      - 25565:25565/udp
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.local.elmurphy.com`)
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    restart: unless-stopped

  qbitwebui:
    image: ghcr.io/mkbula/qbitwebui:2.43.0@sha256:df3239041cecabc3f41a730366ffb605d149b0f8a16ef6b81bceffbd8130a8e2
    container_name: qbitwebui
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DOWNLOADS_PATH=/data/torrents
      - DISABLE_REGISTRATION=true # NOTE: prints initial password to logs on first start
    volumes:
      - qbitwebui-data:/data
      - /mnt/data/torrents:/data/torrents:rw
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbitwebui.rule=Host(`qbitwebui.local.elmurphy.com`)
      - traefik.http.routers.qbitwebui.tls=true
      - traefik.http.services.qbitwebui.loadbalancer.server.port=3000
    restart: unless-stopped

  # NOTE: initial setup is done via "http://<docker localhost ip>:8080"
  # hostname must be added to host_whitelist in sabnzbd.ini
  # reference: https://sabnzbd.org/wiki/extra/hostname-check.html
  sabnzbd:
    image: ghcr.io/linuxserver/sabnzbd:5.0.3-ls255@sha256:6b392fce45ed587ba7213259fbce6f9f725b157b746b36ec53d3f08ee415602e
    container_name: sabnzbd
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - PUID=1215
      - PGID=1215
      - TZ=${TZ}
    volumes:
      - sabnzbd-data:/config
      - /mnt/data/usenet:/data/usenet:rw
    labels:
      - traefik.enable=true
      - traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.local.elmurphy.com`)
      - traefik.http.routers.sabnzbd.tls=true
      - traefik.http.services.sabnzbd.loadbalancer.server.port=8080
    restart: unless-stopped

volumes:
  qbittorrent-data:
    name: qbittorrent-data
  qbitwebui-data:
    name: qbitwebui-data
  sabnzbd-data:
    name: sabnzbd-data

networks:
  proxy:
    external: true
