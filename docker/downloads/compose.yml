---
services:
  # NOTE: Default user is admin and password printed in container log
  # need to update the user/password from webui otherwise password will be regenerated
  # reference: https://docs.linuxserver.io/images/docker-qbittorrent/#application-setup
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r3-ls453@sha256:c9990949e968e99333f47f49da7d16e81ba6e1469c8c46807a65b984c9e8b6ff
    container_name: qbittorrent
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    mem_limit: 1g
    memswap_limit: 1g
    networks:
      - proxy
    environment:
      - PUID=1215
      - PGID=1215
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=25565
    volumes:
      - qbittorrent-data:/config
      - type: bind
        source: /mnt/data/torrents
        target: /data/torrents
        bind:
          propagation: rslave
    ports:
      - 25565:25565
      - 25565:25565/udp
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.local.elmurphy.com`)
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  qbitwebui:
    image: ghcr.io/mkbula/qbitwebui:2.44.2@sha256:75907e7013dedbc87226b9c095ac00b64d4eea814fd5550ccbde114d3f216b22
    container_name: qbitwebui
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - proxy
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DOWNLOADS_PATH=/data/torrents
      - DISABLE_REGISTRATION=true # NOTE: prints initial password to logs on first start
    volumes:
      - qbitwebui-data:/data
      - type: bind
        source: /mnt/data/torrents
        target: /data/torrents
        bind:
          propagation: rslave
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbitwebui.rule=Host(`qbitwebui.local.elmurphy.com`)
      - traefik.http.routers.qbitwebui.tls=true
      - traefik.http.services.qbitwebui.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # NOTE: initial setup is done via "http://<docker localhost ip>:8080"
  # hostname must be added to host_whitelist in sabnzbd.ini
  # reference: https://sabnzbd.org/wiki/extra/hostname-check.html
  sabnzbd:
    image: ghcr.io/linuxserver/sabnzbd:5.0.4-ls262@sha256:b67039e6739c2379f2eac8901248cdfcd78536ee34fe6948faea6b8ce8b4805b
    container_name: sabnzbd
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    networks:
      - proxy
    environment:
      - PUID=1215
      - PGID=1215
      - TZ=${TZ}
    volumes:
      - sabnzbd-data:/config
      - type: bind
        source: /mnt/data/usenet
        target: /data/usenet
        bind:
          propagation: rslave
    labels:
      - traefik.enable=true
      - traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.local.elmurphy.com`)
      - traefik.http.routers.sabnzbd.tls=true
      - traefik.http.services.sabnzbd.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  qbittorrent-data:
    name: qbittorrent-data
  qbitwebui-data:
    name: qbitwebui-data
  sabnzbd-data:
    name: sabnzbd-data

networks:
  proxy:
    external: true
