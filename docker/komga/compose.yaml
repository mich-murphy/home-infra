---
services:
  komga:
    image: gotson/komga:1.24.3@sha256:517033528928003d730e6d3ae99c74470e23938e3f3954924a60dd069bd28c5a
    container_name: komga
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    volumes:
      - komga-data:/config:rw
      - /mnt/data/media/manga:/data:rw
      - /etc/timezone:/etc/timezone:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.komga.rule=Host(`komga.local.elmurphy.com`)
      - traefik.http.routers.komga.tls=true
      - traefik.http.services.komga.loadbalancer.server.port=25600
    restart: unless-stopped

volumes:
  komga-data:
    name: komga-data

networks:
  proxy:
    external: true
