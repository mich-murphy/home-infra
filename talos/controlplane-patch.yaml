machine:
  type: controlplane
  install:
    disk: /dev/sda
    # Factory installer keeps the system extensions across upgrades.
    image: factory.talos.dev/metal-installer/97349bd8a02320e952ef34bdc1369278958bf77fb1b1cbddb62ec6719777a7b6:v1.13.3
  network:
    interfaces:
      - interface: ens18
        addresses:
          - 10.77.20.20/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.77.20.1
    nameservers:
      - 10.77.20.1
  kubelet:
    extraMounts:
      # OpenEBS LocalPV hostpath volumes (user volume "openebs" below).
      - destination: /var/mnt/openebs
        type: bind
        source: /var/mnt/openebs
        options:
          - bind
          - rshared
          - rw
  sysctls:
    # Unattended single node: panic and let the watchdog/reboot recover.
    kernel.panic: "10"
    kernel.panic_on_oops: "1"
    kernel.softlockup_panic: "1"
    # The arr/media apps watch large library trees.
    fs.inotify.max_user_watches: "1048576"
    fs.inotify.max_user_instances: "8192"
cluster:
  apiServer:
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1
          kind: PodSecurityConfiguration
          defaults:
            enforce: baseline
            enforce-version: latest
            audit: restricted
            audit-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            # Cilium needs privileged capabilities; workload namespaces opt in
            # via the pod-security.kubernetes.io/enforce label instead.
            namespaces:
              - kube-system
  network:
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
    # Cilium is installed by talos/bootstrap/helmfile.yaml and then adopted
    # by the Flux HelmRelease.
    cni:
      name: none
  proxy:
    disabled: true
  etcd:
    extraArgs:
      auto-compaction-mode: periodic
      auto-compaction-retention: 5m
  allowSchedulingOnControlPlanes: true
---
# Talos 1.13 emits a HostnameConfig document by default; a static hostname in
# the v1alpha1 machine config conflicts with it, so the hostname lives here.
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: talos-prod-1
---
# Second virtual disk (scsi1), mounted at /var/mnt/openebs.
apiVersion: v1alpha1
kind: UserVolumeConfig
name: openebs
provisioning:
  diskSelector:
    match: disk.dev_path == "/dev/sdb"
  minSize: 100GiB
  grow: true
filesystem:
  type: xfs
---
# Pairs with the i6300esb watchdog device on the Proxmox VM: hard-reset if
# Talos stops feeding the timer.
apiVersion: v1alpha1
kind: WatchdogTimerConfig
device: /dev/watchdog0
timeout: 5m
